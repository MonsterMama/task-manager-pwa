<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Task Manager</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
      --accent:#6c63ff;--accent2:#a78bfa;
      --text:#e2e8f0;--text2:#94a3b8;--border:#2d2d4e;
      --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
      --radius:12p
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
    .view{display:none;min-height:100vh;padding-bottom:100px}
    .view.active{display:block}
    .header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
    .header h1{font-size:20px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hbtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:6px 10px;border-radius:8px;transition:background .15s}
    .hbtn:hover{background:var(--surface)}
    .hbtn.back{color:var(--accent2);font-size:22px}
    .projects-grid{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;position:relative}
    .proj-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .proj-card h3{font-size:17px;font-weight:600;margin-bottom:8px}
    .proj-meta{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
    .proj-top{height:4px;border-radius:4px 4px 0 0;position:absolute;top:0;left:0;right:0}
    .filter-bar{padding:12px 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
    .filter-bar::-webkit-scrollbar{display:none}
    .fbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:6px 16px;border-radius:20px;cursor:pointer;font-size:14px;white-space:nowrap;transition:all .15s}
    .fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tasks-list{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
    .task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s}
    .task-card:hover{border-color:var(--accent2)}
    .task-top{display:flex;align-items:flex-start;gap:12px}
    .task-check{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;font-size:13px}
    .task-check.done{background:var(--success);border-color:var(--success);color:#fff}
    .task-check.inprog{background:var(--accent);border-color:var(--accent);color:#fff}
    .task-name{font-size:15px;font-weight:500;flex:1;line-height:1.4}
    .task-name.done{text-decoration:line-through;color:var(--text2)}
    .task-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .badge{padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
    .b-high{background:#3f1c1c;color:#f87171}
    .b-med{background:#3f2c0f;color:#fbbf24}
    .b-low{background:#0f2f1c;color:#34d399}
    .b-todo{background:#1f2937;color:#9ca3af}
    .b-prog{background:#1c1f3f;color:#818cf8}
    .b-done{background:#0f2f1c;color:#34d399}
    .b-date{background:var(--surface2);color:var(--text2)}
    .task-notes{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.4}
    .empty{text-align:center;padding:80px 40px;color:var(--text2)}
    .empty .icon{font-size:48px;margin-bottom:16px}
    .empty p{font-size:16px;line-height:1.6}
    .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
    .fab:hover{transform:scale(1.1)}
    .fab-sm{bottom:92px;background:var(--surface2);width:44px;height:44px;right:30px;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .fab-sm2{bottom:148px;background:var(--surface2);width:44px;height:44px;right:30px;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
    .overlay.open{display:flex}
    .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 44px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal h2{font-size:18px;font-weight:700;margin-bottom:20px}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
    .fg input:focus,.fg select,.fg textarea:focus{border-color:var(--accent)}
    .fg textarea{resize:vertical;min-height:80px}
    .fg select option{background:var(--surface2)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .mact{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .btn{padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-danger{background:#3f1c1c;color:#f87171;border:1px solid #7f1d1d;width:100%;margin-top:12px}
    .iv{position:relative}
    .iv input{padding-right:40px}
    .iv-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px}
    .voice-ind{display:none;position:fixed;bottom:160px;right:24px;background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--accent2);z-index:201}
    .voice-ind.on{display:block}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:14px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .loading{text-align:center;padding:40px;color:var(--text2);font-size:15px}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>
<body>

<!-- PROJECTS VIEW -->
<div id="vProjects" class="view active">
  <div class="header">
    <h1>My Projects</h1>
    <button class="hbtn" onclick="loadProjects()" title="Refresh">&#8635;</button>
  </div>
  <div id="projectsContainer"></div>
</div>

<!-- TASKS VIEW -->
<div id="vTasks" class="view">
  <div class="header">
    <button class="hbtn back" onclick="showProjects()">&#8592;</button>
    <h1 id="projHeader">Project</h1>
    <button class="hbtn" onclick="loadTasks()" title="Refresh">&#8635;</button>
  </div>
  <div class="filter-bar">
    <button class="fbtn active" data-f="All" onclick="setFilter('All')">All</button>
    <button class="fbtn" data-f="To Do" onclick="setFilter('To Do')">To Do</button>
    <button class="fbtn" data-f="In Progress" onclick="setFilter('In Progress')">In Progress</button>
    <button class="fbtn" data-f="Done" onclick="setFilter('Done')">Done</button>
  </div>
  <div id="tasksContainer" class="tasks-list"></div>
</div>

<!-- FABs -->
<button class="fab fab-sm2" id="fabSpeak" onclick="speakTasks()" title="Read aloud">&#128266;</button>
<button class="fab fab-sm" id="fabVoice" onclick="toggleVoice()" title="Voice input">&#127908;</button>
<button class="fab" id="fabMain" onclick="handleFab()">&#65291;</button>
<div class="voice-ind" id="voiceInd">&#127897; Listening...</div>
<div class="toast" id="toast"></div>

<!-- PROJECT MODAL -->
<div class="overlay" id="mProject">
  <div class="modal">
    <h2 id="mProjTitle">New Project</h2>
    <div class="fg">
      <label>Project Name</label>
      <div class="iv">
        <input type="text" id="projNameInput" placeholder="What are you working on?" autocomplete="off">
        <button class="iv-btn" onclick="voiceField('projNameInput')">&#127908;</button>
      </div>
    </div>
    <div class="mact">
      <button class="btn btn-cancel" onclick="closeModal('mProject')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="mTask">
  <div class="modal">
    <h2 id="mTaskTitle">Add Task</h2>
    <input type="hidden" id="taskIdInput">
    <div class="fg">
      <label>Task Name</label>
      <div class="iv">
        <input type="text" id="taskNameInput" placeholder="What needs doing?" autocomplete="off">
        <button class="iv-btn" onclick="voiceField('taskNameInput')">&#127908;</button>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>Priority</label>
        <select id="taskPriorityInput">
          <option value="">None</option>
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="fg">
        <label>Due Date</label>
        <input type="date" id="taskDueInput">
      </div>
    </div>
    <div class="fg">
      <label>Status</label>
      <select id="taskStatusInput">
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
      </select>
    </div>
    <div class="fg">
      <label>Notes (optional)</label>
      <textarea id="taskNotesInput" placeholder="Any extra details..."></textarea>
    </div>
    <div class="fg">
      <label>Order # (optional)</label>
      <input type="number" id="taskOrderInput" placeholder="e.g. 1, 2, 3...">
    </div>
    <div class="mact">
      <button class="btn btn-cancel" onclick="closeModal('mTask')">Cancel</button>
      <button class="btn btn-primary" id="taskSaveBtn" onclick="saveTask()">Save Task</button>
    </div>
    <div id="taskDeleteRow" style="display:none">
      <button class="btn btn-danger" onclick="deleteTask()">Delete Task</button>
    </div>
  </div>
</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

var view='projects', currentProject=null, allTasks=[], allProjects=[], filter='All', editingId=null;
var rec=null, listening=false, voiceTarget=null;

var COLORS=['#6c63ff','#a78bfa','#34d399','#60a5fa','#f59e0b','#f87171','#ec4899','#14b8a6'];
function projColor(id){var h=0;for(var i=0;i<(id||'').length;i++)h=(h*31+id.charCodeAt(i))&0xffff;return COLORS[h%COLORS.length];}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function loading(id){document.getElementById(id).innerHTML='<div class="loading">Loading...</div>';}

// API
function api(url, opts){
  return fetch(url, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}))
    .then(function(r){return r.ok?r.json():r.json().then(function(d){throw new Error(d.error||'Error');});})
    .catch(function(e){toast('Error: '+e.message);throw e;});
}

// VIEWS
function showView(v){
  view=v;
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.getElementById(v==='projects'?'vProjects':'vTasks').classList.add('active');
}
function showProjects(){currentProject=null;showView('projects');loadProjects();}
function openProject(id,title){currentProject={id:id,title:title};document.getElementById('projHeader').textContent=title;showView('tasks');loadTasks();}

// PROJECTS
function loadProjects(){
  loading('projectsContainer');
  api('/api/projects').then(function(d){
    allProjects=d.projects||[];
    renderProjects();
  }).catch(function(){});
}
function renderProjects(){
  var c=document.getElementById('projectsContainer');
  if(!allProjects.length){
    c.innerHTML='<div class="empty"><div class="icon">&#128203;</div><p>No projects yet.<br>Tap + to create one.</p></div>';
    return;
  }
  var html='<div class="projects-grid">';
  allProjects.forEach(function(p){
    var col=projColor(p.id);
    html+='<div class="proj-card" onclick="openProject(\''+p.id+'\',\''+(p.title||'').replace(/'/g,"\\'")+'\')">'
      +'<div class="proj-top" style="background:'+col+'"></div>'
      +'<h3>'+esc(p.title)+'</h3>'
      +'<div class="proj-meta"><span style="color:'+col+'">&#9679;</span> Tap to open tasks</div>'
      +'</div>';
  });
  html+='</div>';
  c.innerHTML=html;
}
function saveProject(){
  var name=document.getElementById('projNameInput').value.trim();
  if(!name){toast('Enter a project name');return;}
  api('/api/projects',{method:'POST',body:JSON.stringify({title:name})}).then(function(){
    closeModal('mProject');
    document.getElementById('projNameInput').value='';
    toast('Project created!');
    loadProjects();
  }).catch(function(){});
}

// TASKS
function loadTasks(){
  if(!currentProject)return;
  loading('tasksContainer');
  api('/api/tasks?projectId='+encodeURIComponent(currentProject.id)).then(function(d){
    allTasks=d.tasks||[];
    renderTasks();
  }).catch(function(){});
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('active',b.dataset.f===f);});
  renderTasks();
}
function renderTasks(){
  var c=document.getElementById('tasksContainer');
  var list=filter==='All'?allTasks:allTasks.filter(function(t){return t.status===filter;});
  if(!list.length){
    var msg=filter==='All'?'No tasks yet.<br>Tap + to add one.':'No '+filter+' tasks.';
    c.innerHTML='<div class="empty"><div class="icon">&#9989;</div><p>'+msg+'</p></div>';
    return;
  }
  c.innerHTML=list.map(function(t){return taskCard(t);}).join('');
}
function taskCard(t){
  var done=t.status==='Done', prog=t.status==='In Progress';
  var pc={High:'b-high',Medium:'b-med',Low:'b-low'}[t.priority]||'b-todo';
  var sc={Done:'b-done','In Progress':'b-prog','To Do':'b-todo'}[t.status]||'b-todo';
  var chkCls=done?'done':(prog?'inprog':'');
  var chkIcon=done?'&#10003;':(prog?'&#9654;':'');
  var due='';
  if(t.dueDate){var d=new Date(t.dueDate+'T00:00:00');due=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  return '<div class="task-card" onclick="openEdit('+JSON.stringify(t.id)+')">'
    +'<div class="task-top">'
    +'<div class="task-check '+chkCls+'" onclick="event.stopPropagation();cycleStatus('+JSON.stringify(t.id)+','+JSON.stringify(t.status)+')">'+chkIcon+'</div>'
    +'<div class="task-name'+(done?' done':'')+'">'+esc(t.name)+'</div>'
    +'</div>'
    +'<div class="task-badges">'
    +(t.priority?'<span class="badge '+pc+'">'+esc(t.priority)+'</span>':'')
    +'<span class="badge '+sc+'">'+esc(t.status)+'</span>'
    +(due?'<span class="badge b-date">&#128197; '+due+'</span>':'')
    +'</div>'
    +(t.notes?'<div class="task-notes">'+esc(t.notes)+'</div>':'')
    +'</div>';
}
function cycleStatus(id,cur){
  var next=cur==='To Do'?'In Progress':(cur==='In Progress'?'Done':'To Do');
  api('/api/task/'+id,{method:'PATCH',body:JSON.stringify({status:next})}).then(function(){
    var t=allTasks.find(function(x){return x.id===id;});
    if(t)t.status=next;
    renderTasks();
  }).catch(function(){});
}
function openEdit(id){
  var t=allTasks.find(function(x){return x.id===id;});
  if(!t)return;
  editingId=id;
  document.getElementById('mTaskTitle').textContent='Edit Task';
  document.getElementById('taskIdInput').value=id;
  document.getElementById('taskNameInput').value=t.name;
  document.getElementById('taskPriorityInput').value=t.priority||'';
  document.getElementById('taskStatusInput').value=t.status||'To Do';
  document.getElementById('taskDueInput').value=t.dueDate||'';
  document.getElementById('taskNotesInput').value=t.notes||'';
  document.getElementById('taskOrderInput').value=(t.order!==999&&t.order!==undefined)?t.order:'';
  document.getElementById('taskDeleteRow').style.display='block';
  document.getElementById('taskSaveBtn').textContent='Save Changes';
  openModal('mTask');
}
function openAdd(){
  editingId=null;
  document.getElementById('mTaskTitle').textContent='Add Task';
  document.getElementById('taskIdInput').value='';
  document.getElementById('taskNameInput').value='';
  document.getElementById('taskPriorityInput').value='Medium';
  document.getElementById('taskStatusInput').value='To Do';
  document.getElementById('taskDueInput').value='';
  document.getElementById('taskNotesInput').value='';
  document.getElementById('taskOrderInput').value='';
  document.getElementById('taskDeleteRow').style.display='none';
  document.getElementById('taskSaveBtn').textContent='Save Task';
  openModal('mTask');
}
function saveTask(){
  var name=document.getElementById('taskNameInput').value.trim();
  if(!name){toast('Enter a task name');return;}
  var ord=document.getElementById('taskOrderInput').value;
  var payload={
    name:name,
    status:document.getElementById('taskStatusInput').value,
    priority:document.getElementById('taskPriorityInput').value||undefined,
    dueDate:document.getElementById('taskDueInput').value||null,
    notes:document.getElementById('taskNotesInput').value||'',
    order:ord!==''?Number(ord):undefined,
    projectId:currentProject?currentProject.id:undefined
  };
  var url=editingId?'/api/task/'+editingId:'/api/tasks';
  var method=editingId?'PATCH':'POST';
  api(url,{method:method,body:JSON.stringify(payload)}).then(function(){
    closeModal('mTask');
    toast(editingId?'Task updated!':'Task added!');
    loadTasks();
  }).catch(function(){});
}
function deleteTask(){
  if(!editingId||!confirm('Delete this task?'))return;
  api('/api/task/'+editingId,{method:'DELETE'}).then(function(){
    closeModal('mTask');
    toast('Task deleted');
    loadTasks();
  }).catch(function(){});
}

// FAB
function handleFab(){
  if(view==='projects')openModal('mProject');
  else openAdd();
}

// MODALS
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});
});

// VOICE
function initRec(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang='en-US';
  rec.onresult=function(e){
    var txt=e.results[0][0].transcript;
    if(voiceTarget){document.getElementById(voiceTarget).value=txt;voiceTarget=null;}
    else handleCmd(txt);
    stopListen();
  };
  rec.onerror=stopListen;rec.onend=stopListen;
}
function toggleVoice(){
  if(listening){stopListen();return;}
  if(!rec)initRec();
  if(!rec){toast('Voice not supported');return;}
  listening=true;voiceTarget=null;
  document.getElementById('voiceInd').classList.add('on');
  document.getElementById('fabVoice').innerHTML='&#9209;';
  try{rec.start();}catch(e){}
}
function voiceField(fid){
  if(!rec)initRec();
  if(!rec)return;
  voiceTarget=fid;listening=true;
  document.getElementById('voiceInd').classList.add('on');
  try{rec.start();}catch(e){}
}
function stopListen(){
  listening=false;voiceTarget=null;
  document.getElementById('voiceInd').classList.remove('on');
  document.getElementById('fabVoice').innerHTML='&#127908;';
  try{rec&&rec.stop();}catch(e){}
}
function handleCmd(txt){
  var t=txt.toLowerCase().trim();
  toast('Heard: '+txt);
  if(/^(add|new|create) task /i.test(txt)){
    var nm=txt.replace(/^(add|new|create) task /i,'');
    if(view==='tasks'){openAdd();setTimeout(function(){document.getElementById('taskNameInput').value=nm;},100);}
  } else if(/^(add|new|create) project /i.test(txt)){
    var nm=txt.replace(/^(add|new|create) project /i,'');
    openModal('mProject');setTimeout(function(){document.getElementById('projNameInput').value=nm;},100);
  } else if(/^(open|go to) /i.test(txt)){
    var nm=txt.replace(/^(open|go to) /i,'').toLowerCase();
    var p=allProjects.find(function(x){return x.title.toLowerCase().includes(nm);});
    if(p)openProject(p.id,p.title);else toast('Not found: '+nm);
  } else if(t==='back'){
    if(view==='tasks')showProjects();
  }
}
function speakTasks(){
  if(!window.speechSynthesis){toast('TTS not supported');return;}
  var list=filter==='All'?allTasks:allTasks.filter(function(t){return t.status===filter;});
  if(!list.length){speechSynthesis.speak(new SpeechSynthesisUtterance('No tasks.'));return;}
  var txt=(currentProject?currentProject.title+'. ':'')+list.length+' task'+(list.length>1?'s':'')+'. '
    +list.map(function(t,i){return (i+1)+'. '+t.name+(t.status!=='To Do'?', '+t.status:'')+(t.priority&&t.priority!=='Medium'?', '+t.priority:'')+'.';}).join(' ');
  var u=new SpeechSynthesisUtterance(txt);u.rate=0.9;speechSynthesis.speak(u);
}

// KEYBOARD
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(function(el){el.classList.remove('open');});
  }
});

loadProjects();
</script>
